<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simplified Pro Map Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background: #111; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
/**
 * 【ここを編集するだけで素材が増える！】
 * id: 重複しない数字, key: 内部管理用, file: 画像ファイル名, name: ボタンに表示する名前
 */
const ASSET_LIST = [
    { id: 1, key: 't1', file: 'ground_stone.png',  name: '土台' },
    { id: 2, key: 't2', file: 'platform_wood.png', name: '足場' },
    { id: 3, key: 't3', file: 'flag_red.png',      name: '装飾' },
    // 素材を増やしたい時はここに追記するだけ！
];

// --- 基本設定 ---
let TILE_SIZE = 64;
let MAP_WIDTH = 40;
let MAP_HEIGHT = 15;
let MAP_DATA = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(0));

const MODES = { NAV: 0, PLACE: 1, EDIT: 2, DRAG: 3 };
let currentMode = MODES.PLACE;
let currentTileID = ASSET_LIST[0].id;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#000000',
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    this.load.image('bg', 'backgroundCastles.png');
    // リストに基づいて自動ロード
    ASSET_LIST.forEach(a => this.load.image(a.key, a.file));
}

let cam, marker, mapLayer, grid, bgImage, uiContainer, draggedSprite = null;

function create() {
    const scene = this;
    cam = this.cameras.main;
    cam.setZoom(0.5);

    // 背景とグリッドの初期化
    bgImage = this.add.image(0, 0, 'bg').setOrigin(0);
    grid = this.add.grid(0, 0, 0, 0, TILE_SIZE, TILE_SIZE, 0, 0, 0xffffff, 0.15).setOrigin(0).setDepth(1);
    mapLayer = this.add.group();
    marker = this.add.graphics().lineStyle(4, 0xffff00, 1).strokeRect(0, 0, TILE_SIZE, TILE_SIZE).setDepth(10);

    updateWorldSize.call(this);
    createUI.call(this);

    // タッチ入力設定
    this.input.addPointer(2); // 二本指
    this.input.addPointer(3); // 三本指
    setupInteractions.call(this);

    // ロード実行
    loadFromStorage.call(this);
}

function updateWorldSize() {
    const worldW = MAP_WIDTH * TILE_SIZE;
    const worldH = MAP_HEIGHT * TILE_SIZE;
    this.physics.world.setBounds(0, 0, worldW, worldH);
    cam.setBounds(0, 0, worldW, worldH);
    bgImage.setDisplaySize(worldW, worldH); // 背景をマップにフィット
    grid.width = worldW;
    grid.height = worldH;
    if (this.sizeLabel) this.sizeLabel.setText(`SIZE: ${MAP_WIDTH}x${MAP_HEIGHT}`);
}

function setupInteractions() {
    let lastPinchDist = 0;
    let isOverallDragging = false;

    this.input.on('pointermove', (p) => {
        const p1 = this.input.pointer1;
        const p2 = this.input.pointer2;
        const p3 = this.input.pointer3;

        // 三本指：カメラ移動
        if (p1.isDown && p2.isDown && p3.isDown) {
            cam.scrollX -= (p.x - p.prevPosition.x) / cam.zoom;
            cam.scrollY -= (p.y - p.prevPosition.y) / cam.zoom;
            return;
        }
        // 二本指：ズーム
        if (p1.isDown && p2.isDown) {
            let dist = Phaser.Math.Distance.Between(p1.x, p1.y, p2.x, p2.y);
            if (lastPinchDist > 0) cam.setZoom(Phaser.Math.Clamp(cam.zoom * (dist / lastPinchDist), 0.1, 2.0));
            lastPinchDist = dist;
            return;
        }
        // 一本指（UI以外）
        if (p1.isDown && p1.y < window.innerHeight - 180) {
            const wp = p1.positionToCamera(cam);
            const tx = Math.floor(wp.x / TILE_SIZE);
            const ty = Math.floor(wp.y / TILE_SIZE);

            if (currentMode === MODES.PLACE) {
                placeTile(tx, ty);
            } else if (currentMode === MODES.EDIT && draggedSprite) {
                draggedSprite.x = tx * TILE_SIZE + TILE_SIZE/2;
                draggedSprite.y = ty * TILE_SIZE + TILE_SIZE/2;
            } else if (currentMode === MODES.DRAG && isOverallDragging) {
                mapLayer.getChildren().forEach(s => {
                    s.x += (p.x - p.prevPosition.x)/cam.zoom;
                    s.y += (p.y - p.prevPosition.y)/cam.zoom;
                });
            } else if (currentMode === MODES.NAV) {
                cam.scrollX -= (p.x - p.prevPosition.x) / cam.zoom;
                cam.scrollY -= (p.y - p.prevPosition.y) / cam.zoom;
            }
        }
    });

    this.input.on('pointerdown', (p) => {
        if (p.y > window.innerHeight - 180) return;
        const wp = p.positionToCamera(cam);
        const tx = Math.floor(wp.x / TILE_SIZE);
        const ty = Math.floor(wp.y / TILE_SIZE);

        if (currentMode === MODES.EDIT) {
            draggedSprite = mapLayer.getChildren().find(s => s.tx === tx && s.ty === ty);
            if (draggedSprite) draggedSprite.setAlpha(0.6);
        } else if (currentMode === MODES.DRAG) {
            isOverallDragging = true;
        } else if (currentMode === MODES.PLACE) {
            placeTile(tx, ty);
        }
    });

    this.input.on('pointerup', () => {
        lastPinchDist = 0;
        if (draggedSprite) finalizeEdit();
        if (isOverallDragging) finalizeDrag();
        isOverallDragging = false;
        saveToStorage();
    });
}

function createUI() {
    const scene = this;
    const h = 180;
    uiContainer = this.add.container(0, window.innerHeight - h).setScrollFactor(0).setDepth(1000);
    uiContainer.add(this.add.rectangle(0, 0, window.innerWidth, h, 0x000000, 0.9).setOrigin(0));

    // 1. モードボタン (上段)
    const modes = [{ id: MODES.NAV, l: 'NAV' }, { id: MODES.PLACE, l: 'PLACE' }, { id: MODES.EDIT, l: 'EDIT' }, { id: MODES.DRAG, l: 'DRAG' }];
    this.modeBtns = [];
    modes.forEach((m, i) => {
        const x = (window.innerWidth / 4) * (i + 0.5);
        const btn = this.add.container(x, 35).setInteractive(new Phaser.Geom.Rectangle(-50, -25, 100, 50), Phaser.Geom.Rectangle.Contains);
        const bg = this.add.rectangle(0, 0, 85, 45, 0x333333).setStrokeStyle(1, 0x666666);
        btn.add([bg, this.add.text(0, 0, m.l, {fontWeight:'bold'}).setOrigin(0.5)]);
        btn.on('pointerdown', () => { currentMode = m.id; updateUIState(); });
        uiContainer.add(btn);
        this.modeBtns.push({ id: m.id, bg });
    });

    // 2. 素材ボタン (中段) - 自動ループ作成
    const palette = this.add.container(0, 105);
    this.tileBtns = [];
    ASSET_LIST.concat({id: 0, key: null, name: '消し'}).forEach((t, i) => {
        const btn = this.add.container(60 + (i * 90), 0).setInteractive(new Phaser.Geom.Rectangle(-40, -35, 80, 70), Phaser.Geom.Rectangle.Contains);
        const bg = this.add.rectangle(0, 0, 80, 65, 0x222222).setStrokeStyle(2, 0x444444);
        if (t.key) btn.add(this.add.image(0, -12, t.key).setDisplaySize(40, 40));
        btn.add(this.add.text(0, 20, t.name, {fontSize: '12px'}).setOrigin(0.5));
        btn.on('pointerdown', () => { currentTileID = t.id; if(currentMode!==MODES.PLACE) currentMode=MODES.PLACE; updateUIState(); });
        palette.add(btn);
        this.tileBtns.push({ id: t.id, bg });
        uiContainer.add(palette);
    });

    // 3. サイズ・出力 (右下)
    this.sizeLabel = this.add.text(window.innerWidth - 20, 80, '', {fontSize:'14px'}).setOrigin(1, 0.5);
    const szBtn = (x, y, txt, func) => this.add.text(x, y, txt, {backgroundColor:'#444', padding:5}).setInteractive().on('pointerdown', func);
    uiContainer.add([
        this.sizeLabel,
        szBtn(window.innerWidth - 130, 105, 'W-', () => resizeMap(Math.max(5, MAP_WIDTH-5), MAP_HEIGHT)),
        szBtn(window.innerWidth - 90, 105, 'W+', () => resizeMap(MAP_WIDTH+5, MAP_HEIGHT)),
        szBtn(window.innerWidth - 50, 105, 'H-', () => resizeMap(MAP_WIDTH, Math.max(5, MAP_HEIGHT-5))),
        szBtn(window.innerWidth - 50, 70, 'H+', () => resizeMap(MAP_WIDTH, MAP_HEIGHT+5)),
        this.add.text(window.innerWidth - 80, 145, 'EXPORT', {backgroundColor:'#008800', padding:8}).setInteractive().on('pointerdown', exportMap)
    ]);

    updateUIState();
}

function updateUIState() {
    game.scene.scenes[0].modeBtns.forEach(b => b.bg.setFillStyle(b.id === currentMode ? 0x00ffff : 0x333333, b.id === currentMode ? 0.4 : 1));
    game.scene.scenes[0].tileBtns.forEach(b => b.bg.setStrokeStyle(b.id === currentTileID ? 4 : 2, b.id === currentTileID ? 0xffff00 : 0x444444));
}

function resizeMap(newW, newH) {
    let newData = Array(newH).fill().map(() => Array(newW).fill(0));
    for (let r = 0; r < Math.min(MAP_HEIGHT, newH); r++) {
        for (let c = 0; c < Math.min(MAP_WIDTH, newW); c++) newData[r][c] = MAP_DATA[r][c];
    }
    MAP_DATA = newData; MAP_WIDTH = newW; MAP_HEIGHT = newH;
    updateWorldSize.call(game.scene.scenes[0]);
    renderMap();
}

function placeTile(tx, ty) {
    if (tx >= 0 && tx < MAP_WIDTH && ty >= 0 && ty < MAP_HEIGHT) {
        MAP_DATA[ty][tx] = currentTileID;
        renderMap();
    }
}

function renderMap() {
    mapLayer.clear(true, true);
    const scene = game.scene.scenes[0];
    const keyMap = {}; ASSET_LIST.forEach(a => keyMap[a.id] = a.key);

    for (let r = 0; r < MAP_HEIGHT; r++) {
        for (let c = 0; c < MAP_WIDTH; c++) {
            const id = MAP_DATA[r][c];
            if (id === 0) continue;
            const s = scene.add.image(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, keyMap[id]);
            s.setDisplaySize(TILE_SIZE, TILE_SIZE);
            s.tx = c; s.ty = r; s.tileId = id; s.setDepth(2);
            mapLayer.add(s);
        }
    }
}

function finalizeEdit() {
    const ntx = Phaser.Math.Clamp(Math.floor(draggedSprite.x / TILE_SIZE), 0, MAP_WIDTH-1);
    const nty = Phaser.Math.Clamp(Math.floor(draggedSprite.y / TILE_SIZE), 0, MAP_HEIGHT-1);
    MAP_DATA[draggedSprite.ty][draggedSprite.tx] = 0;
    MAP_DATA[nty][ntx] = draggedSprite.tileId;
    draggedSprite = null; renderMap();
}

function finalizeDrag() {
    const newData = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(0));
    mapLayer.getChildren().forEach(s => {
        const ntx = Phaser.Math.Clamp(Math.floor(s.x / TILE_SIZE), 0, MAP_WIDTH-1);
        const nty = Phaser.Math.Clamp(Math.floor(s.y / TILE_SIZE), 0, MAP_HEIGHT-1);
        newData[nty][ntx] = s.tileId;
    });
    MAP_DATA = newData; renderMap();
}

function saveToStorage() { localStorage.setItem('map_save_v2', JSON.stringify(MAP_DATA)); }
function loadFromStorage() {
    const s = localStorage.getItem('map_save_v2');
    if (s) { MAP_DATA = JSON.parse(s); MAP_WIDTH = MAP_DATA[0].length; MAP_HEIGHT = MAP_DATA.length; updateWorldSize.call(game.scene.scenes[0]); renderMap(); }
}
function exportMap() { console.log(JSON.stringify(MAP_DATA)); alert("JSONを出力しました"); }

function update() {
    const wp = this.input.activePointer.positionToCamera(cam);
    marker.x = Math.floor(wp.x / TILE_SIZE) * TILE_SIZE;
    marker.y = Math.floor(wp.y / TILE_SIZE) * TILE_SIZE;
    marker.visible = (currentMode === MODES.PLACE && wp.y < window.innerHeight - 180);
}
</script>
</body>
</html>
